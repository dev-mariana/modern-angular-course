<mat-toolbar class="main-header">
  <button matButton>
    <mat-icon aria-hidden="false" aria-label="Home" fontIcon="home"></mat-icon>
  </button>

  <span class="branding">Modern Angular</span>

  <span class="spacer"></span>

  <button matButton>Products</button>

  <button matButton>
    <mat-icon
      [matBadge]="cartService.totalItems()"
      [matBadgeHidden]="cartService.totalItems() === 0"
      matBadgeDescription="Number of items in the cart"
      aria-hidden="false"
      aria-label="Cart"
      fontIcon="shopping_cart"
    ></mat-icon>
  </button>
</mat-toolbar>
